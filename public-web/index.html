<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>轻跳一下</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="轻跳一下小游戏">
      <canvas id="gameCanvas"></canvas>

      <header class="brand" aria-label="游戏标题">
        <span>轻跳一下</span>
      </header>

      <div class="credit" aria-label="游戏开发者">游戏开发者：崽崽</div>

      <section class="hud" aria-live="polite">
        <div class="score-block">
          <span class="label">分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-block">
          <span class="label">最佳</span>
          <strong id="bestScore">0</strong>
        </div>
      </section>

      <div class="charge-wrap" aria-hidden="true">
        <div id="chargeBar" class="charge-bar"></div>
      </div>

      <div id="tip" class="tip is-hidden"></div>

      <button id="restartButton" class="restart-button" type="button" hidden>重开</button>
    </main>

    <script src="game.js"></script>
  </body>
</html>
